app = "nextgent-backend"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/v1/health"

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  ENVIRONMENT = "production"
  PORT = "8000"

[[statics]]
  guest_path = "/app/static"
  url_prefix = "/static"