version: '3.8'

services:
  # PostgreSQL: Kalıcı veri saklama
  db:
    image: postgres:15-alpine
    container_name: nextgent_db_test
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nextgent_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis: Hızlı oturum ve cache yönetimi
  redis:
    image: redis:7-alpine
    container_name: nextgent_redis_test
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:


networks:
  default:
    name: nextgent_network
