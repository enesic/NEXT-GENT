<!DOCTYPE html>
<html lang="tr">

<head>
    <!-- [DIAGNOSTIC V2.0] AGGRESSIVE Error Shield -->
    <script>
        (function () {
            const shadowPatterns = [
                'chrome-extension', 'sharebx', 'reporter', 'export', 'extension', 'browser-extension', 'syntaxerror', 'content_reporter'
            ];

            const isNoise = (msg) => {
                const s = String(msg || '').toLowerCase();
                return shadowPatterns.some(p => s.includes(p));
            };

            // 1. Intercept Global Errors
            window.onerror = (msg, src) => isNoise(msg) || isNoise(src);
            window.addEventListener('error', (e) => {
                if (isNoise(e.message) || isNoise(e.filename)) {
                    e.stopImmediatePropagation();
                    e.preventDefault();
                }
            }, true);
            window.addEventListener('unhandledrejection', (e) => {
                const r = e.reason ? (e.reason.message || String(e.reason)) : '';
                if (isNoise(r)) { e.stopImmediatePropagation(); e.preventDefault(); }
            }, true);

            // 2. Proxy Console for Absolute Muting
            const hijack = (method) => {
                const original = console[method];
                console[method] = new Proxy(original, {
                    apply: (target, thisArg, args) => {
                        if (args.some(arg => isNoise(arg))) return;
                        return target.apply(thisArg, args);
                    }
                });
            };
            ['log', 'warn', 'error', 'info', 'debug'].forEach(hijack);

            console.info("🛡️ [V2.0] Error Shield Active - Extensions Muted.");
        })();
    </script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGent - Executive Luxury</title>

    <!-- DNS Prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="dns-prefetch" href="//localhost:8001">

    <!-- Preconnect for critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&display=swap"
        rel="stylesheet">


    <!-- Preload module preload for main entry -->
    <link rel="modulepreload" href="/src/main.js">

    <!-- Performance optimizations -->
    <meta name="theme-color" content="#030303">
    <meta name="description" content="NextGent - Executive Luxury Call Center & Analytics Platform">

    <!-- Critical CSS inline to avoid render blocking -->
    <style>
        /* Critical above-the-fold styles */
        html,
        body,
        #app {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #030303;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* Loading indicator */
        .app-loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #030303;
            z-index: 9999;
        }

        .app-loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Loading indicator while app initializes -->
        <div class="app-loading">
            <div class="app-loading-spinner"></div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
